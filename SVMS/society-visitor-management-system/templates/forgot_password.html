{% extends 'base.html' %}

{% block title %}Forgot Password - SVMS{% endblock %}

{% block content %}
<div class="card card-narrow">
    <div class="card-header">
        <h2>Reset Password</h2>
        <p>Update a demo account password and return to login.</p>
    </div>
    <form action="{{ url_for('forgot_password') }}" method="post">
        <div class="form-group">
            <label for="username">Username</label>
            <input id="username" name="username" placeholder="owner@svms.local" required>
        </div>
        <div class="form-group">
            <label for="new_password">New Password</label>
            <div class="password-field">
                <input type="password" id="new_password" name="new_password" minlength="6" required>
                <button type="button" class="password-toggle" onclick="togglePasswordVisibility('new_password')" aria-label="Show password">
                    <svg class="eye-icon eye-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    <svg class="eye-icon eye-closed" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </button>
            </div>
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" minlength="6" required>
        </div>
        <button type="submit" class="btn btn-block">Update Password</button>
    </form>
    <p class="small-text text-center"><a href="{{ url_for('login') }}" class="text-link">Back to login</a></p>
</div>
{% endblock %}
